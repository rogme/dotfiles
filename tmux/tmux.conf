# =============================================================================
# tmux configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Prefix
# -----------------------------------------------------------------------------
# Change prefix from C-b (default) to C-a (screen-style, easier to reach).
# C-a C-a  → jump to last active window (classic screen behaviour)
# C-a a    → send a literal C-a to the terminal (e.g. for nested sessions)
unbind C-b
set -g prefix C-a
bind C-a last-window
bind a send-prefix

# -----------------------------------------------------------------------------
# Terminal & colour
# -----------------------------------------------------------------------------
# tmux-256color gives us italics support beyond xterm-256color.
# The terminal-overrides line enables true 24-bit colour (RGB) in terminals
# that support it, so catppuccin colours render accurately.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------
set -g history-limit 50000       # large scrollback buffer
set -g mouse on                  # click to focus pane/window, scroll with wheel
set -g base-index 1              # start window numbering at 1 (not 0)
set -g pane-base-index 1         # start pane numbering at 1 too
set -g renumber-windows on       # close window 2 of [1,2,3] → windows become [1,2]
set -sg escape-time 0            # no delay after ESC (crucial for vim/nvim)
set -g focus-events on           # pass focus events through to vim autoread
set -g status-interval 5         # refresh status bar every 5 seconds

# -----------------------------------------------------------------------------
# Vi copy mode
# -----------------------------------------------------------------------------
# Use vi keys in copy mode. v starts a selection, y yanks it (and exits),
# mirroring vim's visual-mode workflow.
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# -----------------------------------------------------------------------------
# Splits & windows
# -----------------------------------------------------------------------------
# | splits left/right (vertical divider), - splits top/bottom (horizontal divider).
# New panes and windows inherit the current pane's working directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window   -c "#{pane_current_path}"

# Vim-style pane navigation — no need to reach for the arrow keys.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config in-place without restarting tmux.
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# -----------------------------------------------------------------------------
# Plugins (managed by TPM — install with C-a I inside a tmux session)
# -----------------------------------------------------------------------------
# tpm            : plugin manager itself
# tmux-sensible  : a set of universally-accepted sensible tmux defaults
# catppuccin/tmux: catppuccin mocha theme, pinned to a stable release
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# -----------------------------------------------------------------------------
# Catppuccin theme
# -----------------------------------------------------------------------------
# 'rounded' style wraps each window tab in a pill shape.
# Window text shows only the basename of the current path (not the full path).
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #{b:pane_current_path}'
set -g @catppuccin_window_current_text ' #{b:pane_current_path}'

# -----------------------------------------------------------------------------
# Status line
# -----------------------------------------------------------------------------
# Positioned at the bottom. Left shows the session name; right shows the
# current directory and the time.
set -g status-position bottom
set -g status-left-length 100
set -g status-right-length 100
set -g status-left  '#{E:@catppuccin_status_session}'
set -g status-right '#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}'

# Must be the very last line — initialises TPM and all plugins.
run '~/.tmux/plugins/tpm/tpm'
